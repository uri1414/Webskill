# Netlify configuration for Baseline Studio
# Static site — no build step. Publishes the repo root so the studio site
# and its case-study pages (Salem Roofing, AirScout) are all served.

[build]
  publish = "."

# Serve the studio homepage directly at the root. force = true overrides the
# physical /index.html stub so the studio content loads at "/" with no
# redirect flash. (Duplicate-content on the raw file path is handled by the
# canonical tag on the studio page; a 301 here would loop with the stub's
# meta-refresh, so it is intentionally omitted.)
[[redirects]]
  from = "/"
  to = "/sites/baseline-studio/index.html"
  status = 200
  force = true

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
